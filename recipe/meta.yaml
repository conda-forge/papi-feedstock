{% set name = "papi" %}
{% set version = "7.2.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://icl.utk.edu/projects/papi/downloads/papi-{{ version }}.tar.gz
  sha256: a9bff89ccf39915d729e08ae0a0c6a71ce0ebbe98411e9a2eb3c83c8db0af39c

build:
  number: 0
  skip: true  # [not linux]
  run_exports:
    - {{ pin_subpackage('papi', max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - make

test:
  commands:
    - test -f ${PREFIX}/include/papi.h
    - test -f ${PREFIX}/lib/libpapi.so
    - test -f ${PREFIX}/lib/pkgconfig/papi.pc
    - test -f ${PREFIX}/share/papi/papi_events.csv
    - papi_version

about:
  home: https://icl.utk.edu/papi
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Performance Application Programming Interface

extra:
  recipe-maintainers:
    - apmorton
